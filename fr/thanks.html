<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Merci pour votre commande | KUMIKI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #C9A86C; --charcoal: #1A1A1A; --ivory: #FAF9F7; --muted: #777; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      background: var(--ivory); color: var(--charcoal);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .wrap { max-width: 560px; }
    .mark { font-size: 2.6rem; color: var(--gold); }
    .brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      letter-spacing: .55em; font-size: 13px; margin-top: 18px; text-transform: uppercase;
    }
    h1 { font-weight: 400; font-size: 1.5rem; letter-spacing: .14em; margin-top: 54px; line-height: 2; }
    p { color: var(--muted); font-size: .92rem; line-height: 2.2; margin-top: 28px; letter-spacing: .05em; }
    a.button {
      display: inline-block; margin-top: 54px; padding: 14px 44px;
      border: 1px solid var(--gold); color: var(--gold); text-decoration: none;
      font-size: 11px; letter-spacing: .25em; transition: background .3s, color .3s;
    }
    a.button:hover { background: var(--gold); color: #fff; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark">〼</div>
    <div class="brand">KUMIKI</div>
    <h1>Votre commande a bien été reçue.</h1>
    <p>Un e-mail de confirmation vous a été envoyé.<br>Le travail de l’artisan commence —<br>façonner le hinoki, l’assembler sans un seul clou,<br>nouer le mizuhiki à la main.<br>Votre pièce sera expédiée sous 2 à 4 semaines, avec suivi.</p>
    <a class="button" href="index.html">Retour à l’accueil</a>
  </main>
</body>
</html>
